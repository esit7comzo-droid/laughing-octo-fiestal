name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: Python 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 라이브러리 설치
      run: |
        pip install flask pyinstaller

    - name: EXE 빌드
      run: |
        pyinstaller --onefile --noconsole nas.py

    - name: 결과 업로드
      uses: actions/upload-artifact@v4
      with:
        name: nas-exe
        path: dist/nas.exe
